<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5871ff"/>
      <stop offset="0.55" stop-color="#ff58a8"/>
      <stop offset="1" stop-color="#00ffc8"/>
    </linearGradient>
    <radialGradient id="g1" cx="18%" cy="22%" r="45%">
      <stop offset="0" stop-color="#5871ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5871ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="30%" r="42%">
      <stop offset="0" stop-color="#ff58a8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff58a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="55%" cy="95%" r="45%">
      <stop offset="0" stop-color="#00ffc8" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#00ffc8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>

  <!-- Monograma -->
  <g transform="translate(96,96)">
    <rect x="1.5" y="1.5" width="93" height="93" rx="24" fill="#0f0f0f" stroke="url(#ink)" stroke-width="2.5"/>
    <text x="48" y="50" text-anchor="middle" dominant-baseline="central"
          font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="50"
          letter-spacing="-1.5" fill="url(#ink)">EH</text>
  </g>

  <!-- Texto -->
  <text x="96" y="330" font-family="Montserrat, Arial, sans-serif" font-weight="800"
        font-size="92" letter-spacing="-2" fill="#ffffff">Erika Hernández</text>
  <text x="98" y="398" font-family="Montserrat, Arial, sans-serif" font-weight="600"
        font-size="38" letter-spacing="0.5" fill="#c9c9c9">Full-Stack Developer &amp; Educator</text>

  <!-- Línea acento -->
  <rect x="98" y="440" width="150" height="6" rx="3" fill="url(#ink)"/>

  <!-- Pie -->
  <text x="96" y="560" font-family="Montserrat, Arial, sans-serif" font-weight="500"
        font-size="30" letter-spacing="1" fill="#8a8a8a">Databases · Data · Backend · Frontend</text>
  <text x="1104" y="560" text-anchor="end" font-family="Montserrat, Arial, sans-serif" font-weight="600"
        font-size="30" letter-spacing="0.5" fill="#9aa8ff">erikahernandez.dev</text>
</svg>
